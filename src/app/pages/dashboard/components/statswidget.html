<!-- 1) Main value card -->
<div class="col-span-12">
    <div class="card mb-0 rounded-2xl border border-surface-200/70 dark:border-surface-700/60 shadow-sm">
      <div class="flex items-start justify-between gap-3">
        <div>
          <span class="block text-xs uppercase tracking-wider text-surface-500 dark:text-surface-400 font-semibold mb-2">
            EST total value (USDT Balance)
          </span>
          <div class="text-surface-900 dark:text-surface-0 font-semibold text-2xl sm:text-3xl leading-tight">
            ${{ balance | number: '1.0-2' }}
          </div>
          <div class="mt-1 flex items-center gap-2 text-xs">
            <span class="text-surface-500 dark:text-surface-400">Last trade:</span>
            <span
              class="inline-flex items-center gap-1 font-semibold"
              [ngClass]="todayGain >= 0
                ? 'text-emerald-600 dark:text-emerald-400'
                : 'text-red-600 dark:text-red-400'">
              <i class="pi" [ngClass]="todayGain >= 0 ? 'pi-arrow-up-right' : 'pi-arrow-down-right'"></i>
              {{ todayGain >= 0 ? '+' : '-' }}${{ (todayGain < 0 ? -todayGain : todayGain) | number: '1.0-2' }}
            </span>
          </div>
        </div>
  
        <button
          pButton
          type="button"
          label="Add funds"
          icon="pi pi-plus"
          class="p-button-sm"
          routerLink="/app/page/deposit">
        </button>
      </div>
    </div>
  </div>
  
  <!-- 2) Quick actions row (buttons) -->
<div class="col-span-12">
    <div class="grid grid-cols-4 gap-2 sm:gap-3">
      <button
        pButton
        type="button"
        [text]="true"
        routerLink="/app/page/spot-trade"
        class="p-2 sm:p-3 flex flex-col items-center justify-center gap-2 hover:opacity-90 transition-opacity">
        <div class="w-10 h-10 rounded-xl bg-indigo-100 dark:bg-indigo-400/15 text-indigo-600 dark:text-indigo-300 flex items-center justify-center">
          <i class="pi pi-fw pi-chart-scatter text-base"></i>
        </div>
        <span class="text-xs font-medium text-surface-700 dark:text-surface-200 text-center">Spot Trade</span>
      </button>
  
      <button
        pButton
        type="button"
        [text]="true"
        routerLink="/app/page/ai-trading"
        class="p-2 sm:p-3 flex flex-col items-center justify-center gap-2 hover:opacity-90 transition-opacity">
        <div class="w-10 h-10 rounded-xl bg-violet-100 dark:bg-violet-400/15 text-violet-600 dark:text-violet-300 flex items-center justify-center">
            <i class="pi pi-microchip-ai text-base"></i>
        </div>
        <span class="text-xs font-medium text-surface-700 dark:text-surface-200 text-center">AI Trading</span>
      </button>
  
      <button
        pButton
        type="button"
        [text]="true"
        routerLink="/app/page/loan"
        class="p-2 sm:p-3 flex flex-col items-center justify-center gap-2 hover:opacity-90 transition-opacity">
        <div class="w-10 h-10 rounded-xl bg-emerald-100 dark:bg-emerald-400/15 text-emerald-600 dark:text-emerald-300 flex items-center justify-center">
          <i class="pi pi-fw pi-money-bill text-base"></i>
        </div>
        <span class="text-xs font-medium text-surface-700 dark:text-surface-200 text-center">Loan</span>
      </button>
  
      <button
        pButton
        type="button"
        [text]="true"
        routerLink="/app/page/events"
        class="p-2 sm:p-3 flex flex-col items-center justify-center gap-2 hover:opacity-90 transition-opacity">
        <div class="w-10 h-10 rounded-xl bg-orange-100 dark:bg-orange-400/15 text-orange-600 dark:text-orange-300 flex items-center justify-center">
          <i class="pi pi-fw pi-calendar text-base"></i>
        </div>
        <span class="text-xs font-medium text-surface-700 dark:text-surface-200 text-center">Event</span>
      </button>
    </div>
  </div>
