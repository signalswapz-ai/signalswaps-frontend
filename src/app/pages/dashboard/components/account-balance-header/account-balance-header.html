<div class="col-span-12">
    <div class="flex flex-col sm:flex-row sm:items-start sm:justify-between gap-3 px-1 sm:px-2 py-1">
      <div>
        <span class="block text-[11px] sm:text-xs uppercase tracking-wider text-surface-500 dark:text-surface-400 font-semibold mb-1.5">
          EST total value (USDT)
        </span>
  
        <div class="text-surface-900 dark:text-surface-0 font-bold text-3xl sm:text-5xl leading-tight">
          ${{ balance | number: '1.0-2' }}
        </div>
  
        <div class="mt-1.5 flex items-center gap-2 text-xs sm:text-sm">
          <span class="text-surface-500 dark:text-surface-400">Last trade:</span>
          <span
            class="inline-flex items-center gap-1 font-semibold"
            [ngClass]="todayGain >= 0
              ? 'text-emerald-600 dark:text-emerald-400'
              : 'text-red-600 dark:text-red-400'">
            <i class="pi" [ngClass]="todayGain >= 0 ? 'pi-arrow-up-right' : 'pi-arrow-down-right'"></i>
            {{ todayGain >= 0 ? '+' : '-' }}${{ (todayGain < 0 ? -todayGain : todayGain) | number: '1.0-2' }}
          </span>
        </div>
      </div>
  
      <button
        pButton
        type="button"
        label="Deposit"
        icon="pi pi-plus"
        routerLink="/app/page/deposit"
        styleClass="w-full sm:w-auto h-11 sm:h-14 px-4 sm:px-6 text-sm sm:text-lg font-semibold">
      </button>
    </div>
  </div>

<div class="col-span-12 mt-3">
    <div class="grid grid-cols-4 gap-2 sm:gap-3">
      <!-- Spot Trade -->
      <div
        class="card mb-0 h-[90px] sm:h-[98px] rounded-xl border border-surface-200 dark:border-surface-700 bg-white dark:bg-surface-900 shadow-sm px-1.5 sm:px-2 py-2 flex flex-col items-center justify-center gap-1.5 cursor-pointer transition-all duration-200 hover:shadow-md active:scale-[0.98]"
        role="button"
        tabindex="0"
        (click)="goTo('/app/page/spot-trade')">
        <div class="w-9 h-9 sm:w-10 sm:h-10 rounded-lg bg-gradient-to-br from-indigo-100 to-indigo-200 dark:from-indigo-500/20 dark:to-indigo-400/10 text-indigo-700 dark:text-indigo-300 flex items-center justify-center shrink-0">
          <i class="pi pi-fw pi-chart-scatter text-sm sm:text-base"></i>
        </div>
        <span class="text-[10px] sm:text-[11px] font-semibold text-surface-700 dark:text-surface-200 leading-tight text-center">
          Spot
        </span>
      </div>
  
      <!-- AI Trading -->
      <div
        class="card mb-0 h-[90px] sm:h-[98px] rounded-xl border border-surface-200 dark:border-surface-700 bg-white dark:bg-surface-900 shadow-sm px-1.5 sm:px-2 py-2 flex flex-col items-center justify-center gap-1.5 cursor-pointer transition-all duration-200 hover:shadow-md active:scale-[0.98]"
        role="button"
        tabindex="0"
        (click)="goTo('/app/page/ai-trading')">
        <div class="w-9 h-9 sm:w-10 sm:h-10 rounded-lg bg-gradient-to-br from-violet-100 to-fuchsia-100 dark:from-violet-500/20 dark:to-fuchsia-400/10 text-violet-700 dark:text-violet-300 flex items-center justify-center shrink-0">
          <i class="pi pi-bolt text-sm sm:text-base"></i>
        </div>
        <span class="text-[10px] sm:text-[11px] font-semibold text-surface-700 dark:text-surface-200 leading-tight text-center">
          AI
        </span>
      </div>
  
      <!-- Loan -->
      <div
        class="card mb-0 h-[90px] sm:h-[98px] rounded-xl border border-surface-200 dark:border-surface-700 bg-white dark:bg-surface-900 shadow-sm px-1.5 sm:px-2 py-2 flex flex-col items-center justify-center gap-1.5 cursor-pointer transition-all duration-200 hover:shadow-md active:scale-[0.98]"
        role="button"
        tabindex="0"
        (click)="goTo('/app/page/loan')">
        <div class="w-9 h-9 sm:w-10 sm:h-10 rounded-lg bg-gradient-to-br from-emerald-100 to-teal-100 dark:from-emerald-500/20 dark:to-teal-400/10 text-emerald-700 dark:text-emerald-300 flex items-center justify-center shrink-0">
          <i class="pi pi-fw pi-money-bill text-sm sm:text-base"></i>
        </div>
        <span class="text-[10px] sm:text-[11px] font-semibold text-surface-700 dark:text-surface-200 leading-tight text-center">
          Loan
        </span>
      </div>
  
      <!-- Event -->
      <div
        class="card mb-0 h-[90px] sm:h-[98px] rounded-xl border border-surface-200 dark:border-surface-700 bg-white dark:bg-surface-900 shadow-sm px-1.5 sm:px-2 py-2 flex flex-col items-center justify-center gap-1.5 cursor-pointer transition-all duration-200 hover:shadow-md active:scale-[0.98]"
        role="button"
        tabindex="0"
        (click)="goTo('/app/page/events')">
        <div class="w-9 h-9 sm:w-10 sm:h-10 rounded-lg bg-gradient-to-br from-amber-100 to-orange-100 dark:from-amber-500/20 dark:to-orange-400/10 text-amber-700 dark:text-amber-300 flex items-center justify-center shrink-0">
          <i class="pi pi-fw pi-calendar text-sm sm:text-base"></i>
        </div>
        <span class="text-[10px] sm:text-[11px] font-semibold text-surface-700 dark:text-surface-200 leading-tight text-center">
          Event
        </span>
      </div>
    </div>
  </div>
