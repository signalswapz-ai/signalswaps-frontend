<div
  class="bg-surface-50 dark:bg-surface-950 flex items-center justify-center min-h-screen w-full overflow-hidden px-4 py-6">
  <div class="w-full max-w-md">
    <div class="rounded-3xl p-[1px]">
      <div class="rounded-3xl bg-surface-0 dark:bg-surface-900 px-6 sm:px-8 py-8 sm:py-10 shadow-sm">
        <div class="text-center mb-7">
          <h3 class="text-2xl sm:text-3xl font-semibold text-surface-900 dark:text-surface-0 mb-2">
            Welcome back
          </h3>
          <p class="text-sm sm:text-base text-surface-600 dark:text-surface-300 leading-relaxed">
            Sign in to Signal Swaps with your email and password.
          </p>
        </div>

        <p-fluid>
          <div class="flex flex-col gap-5">
            <div>
              <p-floatlabel>
                <input pInputText id="login-email" type="email" [(ngModel)]="email" autocomplete="email"
                  class="w-full" [disabled]="isLoading" />
                <label for="login-email">Email address</label>
              </p-floatlabel>
            </div>

            <div class="flex flex-col gap-2">
              <label for="login-password" class="text-sm font-medium text-surface-700 dark:text-surface-200">
                Password
              </label>
              <p-password id="login-password" [(ngModel)]="password" [toggleMask]="true" [feedback]="false"
                [fluid]="true" styleClass="w-full" inputStyleClass="w-full" [disabled]="isLoading"
                autocomplete="current-password" />
            </div>

            <div class="flex flex-col xs:flex-row xs:items-center xs:justify-between gap-3 -mt-1">
              <div class="flex items-center gap-2">
                <p-checkbox [(ngModel)]="checked" inputId="rememberme" [binary]="true" [disabled]="isLoading" />
                <label for="rememberme" class="text-sm text-surface-600 dark:text-surface-400 cursor-pointer">
                  Remember me
                </label>
              </div>
              <a routerLink="/auth/forgot-password"
                class="text-sm font-medium text-primary-600 dark:text-primary-400 hover:underline self-start xs:self-auto">
                Forgot password?
              </a>
            </div>

            <button pButton pRipple type="button" (click)="onLogin()" [disabled]="isLoading" label="Sign in"
              severity="primary" styleClass="w-full h-12" [loading]="isLoading"></button>

            <div class="my-2 flex items-center gap-3">
              <span class="h-px flex-1 bg-surface-300 dark:bg-surface-700"></span>
              <span
                class="text-xs sm:text-sm font-medium text-surface-500 dark:text-surface-400 uppercase tracking-wide">
                OR
              </span>
              <span class="h-px flex-1 bg-surface-300 dark:bg-surface-700"></span>
            </div>

            <p class="text-center text-sm text-surface-600 dark:text-surface-300 -mt-1">
              New to signalswaps?
            </p>
            <button pButton pRipple type="button" styleClass="w-full h-11" label="Create an account"
              routerLink="/auth/register" severity="info" [disabled]="isLoading"></button>

         
          </div>
        </p-fluid>
      </div>
    </div>
  </div>
</div>

<p-dialog [(visible)]="errorDialog" [style]="{ width: '90vw', maxWidth: '450px' }"
  [breakpoints]="{ '960px': '90vw', '640px': '95vw' }" header="Sign in failed" [modal]="true" [closable]="true"
  [draggable]="false" [resizable]="false">
  <div class="flex flex-col gap-3 sm:gap-4 text-center px-2 sm:px-4">
    <i class="pi pi-times-circle text-5xl sm:text-6xl md:text-7xl text-red-500 mx-auto"></i>
    <p class="text-sm sm:text-base md:text-lg font-medium text-surface-700 dark:text-surface-300 px-2">
      {{ errorMessage }}
    </p>
  </div>
  <ng-template pTemplate="footer">
    <div class="w-full px-2 sm:px-0">
      <p-button label="Try again" (onClick)="closeErrorDialog()" styleClass="w-full text-sm sm:text-base"
        severity="danger" [style]="{ height: '44px' }"></p-button>
    </div>
  </ng-template>
</p-dialog>

<div *ngIf="isLoading" class="loading-overlay">
  <p-progressSpinner strokeWidth="4" animationDuration=".8s" styleClass="custom-spinner">
  </p-progressSpinner>
</div>
