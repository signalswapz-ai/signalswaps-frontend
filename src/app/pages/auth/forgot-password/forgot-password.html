<div
  class="bg-surface-50 dark:bg-surface-950 flex items-center justify-center min-h-screen w-full overflow-hidden px-4 py-6">
  <div class="w-full max-w-md">
    <div class="rounded-3xl p-[1px]">
      <div class="rounded-3xl bg-surface-0 dark:bg-surface-900 px-6 sm:px-8 py-8 sm:py-10 shadow-sm relative">

        <button pButton type="button" icon="pi pi-times" [text]="true" [rounded]="true" severity="secondary"
          aria-label="Close" class="!absolute top-3 right-3 hover:bg-surface-100 dark:hover:bg-surface-800"
          routerLink="/auth/login">
        </button>

        <div class="text-center mb-7">
          <div
            class="mx-auto mb-4 flex h-14 w-14 items-center justify-center rounded-full bg-primary-50 dark:bg-primary-400/10 ring-1 ring-primary-200/40 dark:ring-primary-500/20">
            <i class="pi pi-unlock text-2xl text-primary-600"></i>
          </div>

          <h2 class="text-2xl sm:text-3xl font-semibold text-surface-900 dark:text-surface-0 mb-2">
            Forgot your password?
          </h2>

          <p class="text-sm sm:text-base text-surface-600 dark:text-surface-300 leading-relaxed max-w-sm mx-auto">
            Enter your email address and we’ll send you a link to reset your password.
          </p>
        </div>

        <p-fluid>
          <div class="flex flex-col gap-5">
            <div>
              <p-floatlabel>
                <input pInputText id="forgot-email" type="email" [(ngModel)]="email" (blur)="onEmailBlur()"
                  (ngModelChange)="validateEmail()" autocomplete="email" required [disabled]="isLoading"
                  [class.ng-invalid]="emailTouched && emailError" class="w-full" />
                <label for="forgot-email">Email address</label>
              </p-floatlabel>

              <small class="text-red-500 text-sm mt-1 block" *ngIf="emailTouched && emailError">
                {{ emailError }}
              </small>
            </div>

            <button pButton pRipple type="button" (click)="onSendResetLink()" [disabled]="isLoading" label="Next"
              severity="primary" styleClass="w-full h-12" [loading]="isLoading">
            </button>
          </div>
        </p-fluid>

      </div>
    </div>
  </div>
</div>

<!-- After API success: e.g. “Check your inbox” (no sensitive details) -->
<p-dialog [(visible)]="successDialog" [style]="{ width: '90vw', maxWidth: '450px' }"
  [breakpoints]="{ '960px': '90vw', '640px': '95vw' }" header="Check your email" [modal]="true" [closable]="false"
  [draggable]="false" [resizable]="false">
  <div class="flex flex-col gap-4 text-center px-2 sm:px-4">
    <div class="mx-auto flex h-16 w-16 items-center justify-center rounded-full bg-green-50 dark:bg-green-500/10">
      <i class="pi pi-send text-3xl text-green-600 dark:text-green-400"></i>
    </div>
    <p class="text-sm sm:text-base text-surface-700 dark:text-surface-300 leading-relaxed">
      If an account exists for that address, we’ve sent a message with a link to reset your password. The link expires
      after a short time for your security.
    </p>
  </div>
  <ng-template pTemplate="footer">
    <div class="w-full px-2 sm:px-0">
      <p-button label="Back to sign in" (onClick)="goToLogin()" styleClass="w-full text-sm sm:text-base"
        [style]="{ height: '44px' }"></p-button>
    </div>
  </ng-template>
</p-dialog>

<p-dialog [(visible)]="errorDialog" [style]="{ width: '90vw', maxWidth: '450px' }"
  [breakpoints]="{ '960px': '90vw', '640px': '95vw' }" header="Something went wrong" [modal]="true" [closable]="true"
  [draggable]="false" [resizable]="false">
  <div class="flex flex-col gap-3 sm:gap-4 text-center px-2 sm:px-4">
    <i class="pi pi-times-circle text-5xl sm:text-6xl text-red-500 mx-auto"></i>
    <p class="text-sm sm:text-base font-medium text-surface-700 dark:text-surface-300 px-2">
      {{ errorMessage }}
    </p>
  </div>
  <ng-template pTemplate="footer">
    <div class="w-full px-2 sm:px-0">
      <p-button label="Try again" (onClick)="closeErrorDialog()" styleClass="w-full text-sm sm:text-base"
        severity="danger" [style]="{ height: '44px' }"></p-button>
    </div>
  </ng-template>
</p-dialog>

<div *ngIf="isLoading" class="loading-overlay">
  <p-progressSpinner strokeWidth="4" animationDuration=".8s" styleClass="custom-spinner"></p-progressSpinner>
</div>
