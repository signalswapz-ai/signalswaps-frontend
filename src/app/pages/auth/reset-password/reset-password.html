<div class="bg-surface-50 dark:bg-surface-950 flex items-center justify-center min-h-screen w-full overflow-hidden px-4 py-6">
  <div class="w-full max-w-md">
    <div class="rounded-3xl p-[1px]">
      <div class="rounded-3xl bg-surface-0 dark:bg-surface-900 px-6 sm:px-8 py-8 sm:py-10 shadow-sm">
        <div class="text-center mb-7">
          <div class="mx-auto mb-4 flex h-14 w-14 items-center justify-center rounded-full bg-primary-50 dark:bg-primary-400/10">
            <i class="pi pi-lock text-2xl text-primary-600 dark:text-primary-400"></i>
          </div>
          <h2 class="text-2xl sm:text-3xl font-semibold text-surface-900 dark:text-surface-0 mb-2">
            Reset password
          </h2>
          <p class="text-sm sm:text-base text-surface-600 dark:text-surface-300 leading-relaxed">
            Enter your new password and confirm it.
          </p>
        </div>

        <p-fluid>
          <div class="flex flex-col gap-5">
            <div>
              <label for="new-password" class="text-sm font-medium text-surface-700 dark:text-surface-200 mb-2 block">
                New password
              </label>
              <p-password
                id="new-password"
                [(ngModel)]="password"
                (ngModelChange)="onPasswordChange()"
                (blur)="onPasswordBlur()"
                [toggleMask]="true"
                [feedback]="false"
                [fluid]="true"
                styleClass="w-full"
                inputStyleClass="w-full"
                [disabled]="isLoading"
                autocomplete="new-password"
                [invalid]="passwordTouched && !!passwordError">
              </p-password>
              <small class="text-red-500 text-sm mt-1 block" *ngIf="passwordTouched && passwordError">
                {{ passwordError }}
              </small>
            </div>

            <div>
              <label for="confirm-password" class="text-sm font-medium text-surface-700 dark:text-surface-200 mb-2 block">
                Confirm password
              </label>
              <p-password
                id="confirm-password"
                [(ngModel)]="confirmPassword"
                (ngModelChange)="onConfirmPasswordChange()"
                (blur)="onConfirmPasswordBlur()"
                [toggleMask]="true"
                [feedback]="false"
                [fluid]="true"
                styleClass="w-full"
                inputStyleClass="w-full"
                [disabled]="isLoading"
                autocomplete="new-password"
                [invalid]="confirmPasswordTouched && !!confirmPasswordError">
              </p-password>
              <small class="text-red-500 text-sm mt-1 block" *ngIf="confirmPasswordTouched && confirmPasswordError">
                {{ confirmPasswordError }}
              </small>
            </div>

            <button
              pButton
              pRipple
              type="button"
              label="Update password"
              severity="primary"
              styleClass="w-full h-12"
              [disabled]="isLoading"
              [loading]="isLoading"
              (click)="onResetPassword()">
            </button>
          </div>
        </p-fluid>
      </div>
    </div>
  </div>
</div>

<p-dialog
  [(visible)]="successDialog"
  [style]="{ width: '90vw', maxWidth: '440px' }"
  [breakpoints]="{ '960px': '90vw', '640px': '95vw' }"
  header="Password updated"
  [modal]="true"
  [closable]="false"
  [draggable]="false"
  [resizable]="false">
  <div class="flex flex-col gap-4 text-center px-2 sm:px-4">
    <i class="pi pi-check-circle text-5xl sm:text-6xl text-green-500 mx-auto"></i>
    <p class="text-sm sm:text-base text-surface-700 dark:text-surface-300">
      Your password has been reset successfully. You can now sign in.
    </p>
  </div>
  <ng-template pTemplate="footer">
    <div class="w-full px-2 sm:px-0">
      <p-button
        label="Go to sign in"
        (onClick)="goToLogin()"
        styleClass="w-full text-sm sm:text-base"
        [style]="{ height: '44px' }">
      </p-button>
    </div>
  </ng-template>
</p-dialog>

<p-dialog
  [(visible)]="errorDialog"
  [style]="{ width: '90vw', maxWidth: '450px' }"
  [breakpoints]="{ '960px': '90vw', '640px': '95vw' }"
  header="Something went wrong"
  [modal]="true"
  [closable]="true"
  [draggable]="false"
  [resizable]="false">
  <div class="flex flex-col gap-3 sm:gap-4 text-center px-2 sm:px-4">
    <i class="pi pi-times-circle text-5xl sm:text-6xl text-red-500 mx-auto"></i>
    <p class="text-sm sm:text-base font-medium text-surface-700 dark:text-surface-300 px-2">
      {{ errorMessage }}
    </p>
  </div>
  <ng-template pTemplate="footer">
    <div class="w-full px-2 sm:px-0">
      <p-button
        label="Try again"
        (onClick)="closeErrorDialog()"
        styleClass="w-full text-sm sm:text-base"
        severity="danger"
        [style]="{ height: '44px' }">
      </p-button>
    </div>
  </ng-template>
</p-dialog>

<div *ngIf="isLoading" class="loading-overlay">
  <p-progressSpinner strokeWidth="4" animationDuration=".8s" styleClass="custom-spinner"></p-progressSpinner>
</div>
