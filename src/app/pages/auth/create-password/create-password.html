<div
  class="bg-surface-50 dark:bg-surface-950 flex items-center justify-center min-h-screen w-full overflow-hidden px-4 py-6">
  <div class="w-full max-w-md">
    <div class="rounded-3xl p-[1px]">
      <div class="rounded-3xl bg-surface-0 dark:bg-surface-900 px-6 sm:px-8 py-8 sm:py-10 shadow-sm">
        <div class="text-center mb-7">
          <div
            class="mx-auto mb-4 flex h-14 w-14 items-center justify-center rounded-full bg-primary-50 dark:bg-primary-400/10">
            <i class="pi pi-lock text-2xl text-primary-600 dark:text-primary-400"></i>
          </div>
          <h2 class="text-2xl sm:text-3xl font-semibold text-surface-900 dark:text-surface-0 mb-2">
            Create your account credentials
          </h2>
          <p class="text-sm sm:text-base text-surface-600 dark:text-surface-300 leading-relaxed">
            Set your username and a strong password to secure your account.
          </p>
        </div>

        <p-fluid>
          <div class="flex flex-col gap-5">
            <div class="flex flex-col gap-2">
              <label for="username" class="text-sm font-medium text-surface-700 dark:text-surface-200">
                Username
              </label>
              <input id="username" type="text" pInputText [(ngModel)]="username" [disabled]="isLoading" class="w-full"
                autocomplete="username" placeholder="Enter username" />
            </div>

            <div class="flex flex-col gap-2">
              <label for="password" class="text-sm font-medium text-surface-700 dark:text-surface-200">
                Password
              </label>
              <p-password id="password" [(ngModel)]="password" [toggleMask]="true" [feedback]="false"
                [disabled]="isLoading" styleClass="w-full" inputStyleClass="w-full" [fluid]="true"
                autocomplete="new-password" />
            </div>

            <ul class="text-sm text-surface-600 dark:text-surface-400 space-y-1.5 list-disc pl-5">
              <li>8 to 128 characters</li>
              <li>At least 1 number</li>
              <li>At least 1 upper case letter</li>
            </ul>

            <button pButton pRipple type="button" (click)="onContinue()"
              [disabled]="isLoading || !isPasswordValid() || !isUsernameValid()" label="Continue" severity="primary"
              styleClass="w-full h-12"></button>
          </div>
        </p-fluid>
      </div>
    </div>
  </div>
</div>

<p-dialog [(visible)]="successDialog" [style]="{ width: '90vw', maxWidth: '440px' }"
  [breakpoints]="{ '960px': '90vw', '640px': '95vw' }" header="Welcome aboard!" [modal]="true" [closable]="false"
  [draggable]="false" [resizable]="false" [dismissableMask]="false">
  <div class="flex flex-col gap-4 sm:gap-5 text-center px-1 sm:px-3 pt-1">
    <div
      class="mx-auto flex h-20 w-20 sm:h-24 sm:w-24 items-center justify-center rounded-full bg-green-50 dark:bg-green-500/10 ring-1 ring-green-200/60 dark:ring-green-500/20">
      <i class="pi pi-check-circle text-5xl sm:text-6xl text-green-500 dark:text-green-400"></i>
    </div>
    <div class="space-y-2">
      <p class="text-base sm:text-lg font-semibold text-surface-900 dark:text-surface-0">
        You’ve successfully registered
      </p>
      <p class="text-sm sm:text-base text-surface-600 dark:text-surface-400 leading-relaxed max-w-sm mx-auto">
        Your account is ready. Sign in with your email and password to get started.
      </p>
    </div>
  </div>
  <ng-template pTemplate="footer">
    <div class="w-full px-2 sm:px-0 pt-1">
      <p-button label="Go to sign in" (onClick)="goToLogin()" styleClass="w-full text-sm sm:text-base"
        [style]="{ height: '44px' }"></p-button>
    </div>
  </ng-template>
</p-dialog>

<div *ngIf="isLoading" class="loading-overlay">
  <p-progressSpinner strokeWidth="4" animationDuration=".8s" styleClass="custom-spinner">
  </p-progressSpinner>
</div>
