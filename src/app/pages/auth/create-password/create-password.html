<app-floating-configurator />
<img src="assets/demo/images/logo/TradexCoinLogo.png" alt="TradexCoin"
  class="fixed top-4 left-4 z-50 w-16 h-16 sm:w-20 sm:h-20 object-contain" />

<div
  class="bg-surface-50 dark:bg-surface-950 flex items-center justify-center min-h-screen w-full overflow-hidden px-4 py-6">
  <div class="w-full max-w-md">
    <div class="rounded-3xl p-[1px]">
      <div class="rounded-3xl bg-surface-0 dark:bg-surface-900 px-6 sm:px-8 py-8 sm:py-10 shadow-sm">
        <div class="text-center mb-7">
          <div
            class="mx-auto mb-4 flex h-14 w-14 items-center justify-center rounded-full bg-primary-50 dark:bg-primary-400/10">
            <i class="pi pi-lock text-2xl text-primary-600 dark:text-primary-400"></i>
          </div>
          <h2 class="text-2xl sm:text-3xl font-semibold text-surface-900 dark:text-surface-0 mb-2">
            Create a password
          </h2>
          <p class="text-sm sm:text-base text-surface-600 dark:text-surface-300 leading-relaxed">
            Choose a strong password to secure your account.
          </p>
        </div>

        <p-fluid>
          <div class="flex flex-col gap-5">
            <div class="flex flex-col gap-2">
              <label for="password" class="text-sm font-medium text-surface-700 dark:text-surface-200">
                Password
              </label>
              <p-password id="password" [(ngModel)]="password" [toggleMask]="true" [feedback]="false"
                [disabled]="isLoading" styleClass="w-full" inputStyleClass="w-full" [fluid]="true"
                autocomplete="new-password" />
            </div>

            <ul class="text-sm text-surface-600 dark:text-surface-400 space-y-1.5 list-disc pl-5">
              <li>8 to 128 characters</li>
              <li>At least 1 number</li>
              <li>At least 1 upper case letter</li>
            </ul>

            <button pButton pRipple type="button" (click)="onContinue()" [disabled]="isLoading || !isPasswordValid()"
              label="Continue" severity="primary" styleClass="w-full h-12"></button>
          </div>
        </p-fluid>
      </div>
    </div>
  </div>
</div>

<div *ngIf="isLoading" class="loading-overlay">
  <p-progressSpinner strokeWidth="4" animationDuration=".8s" styleClass="custom-spinner">
  </p-progressSpinner>
</div>
